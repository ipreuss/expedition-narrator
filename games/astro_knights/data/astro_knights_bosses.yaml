bosses:
  - id: furion
    name: Furion
    wave_name: 1st Wave
    box: Astro Knights
    battle_difficulties:
      1: normal
      3: expert
      4: expert
    background: A sentient mass of collapsing star matter that drags stolen artillery into its orbit and turns every delay into a deadlier exchange.
    story_notes: The fight should emphasize urgency, escalating weapon charge, and the danger of letting Furion and its followers grow unchecked.
  - id: shade_sculptor
    name: Shade Sculptor
    wave_name: 2nd Wave
    box: Mystery of Solarus
    battle_difficulties:
      1: normal
      4: expert
    background: A corruption-driven threat entwined with the Mother, the vast machine that keeps the floating city of Eos above the planet's acidic clouds.
    story_notes: The fight should emphasize keeping Eos alive while preventing the Mother from either failing completely or gaining too much destructive power. Darkness, invasive creatures, falling altitude, and delicate control of a damaged system should define the pressure.
  - id: dirathian_behemoth
    name: Dirathian Behemoth
    wave_name: 2nd Wave
    box: Astro Knights - Eternity
    battle_difficulties:
      1: normal
    background: A violent beast native to the freezing blizzards of Dirath, fighting on its own home turf.
    story_notes: The fight should emphasize direct physical pressure, worsening cold, and the need to end the battle quickly before storms, freezing conditions, and swarming local creatures turn the field into a death trap.
  - id: architect_0815
    name: Architect 0-815
    wave_name: 1st Wave
    box: Astro Knights
    battle_difficulties:
      1: normal
      3: expert
      4: expert
    background: A factory machine that broke from its programming and built a droid army for robotic domination.
    story_notes: The fight should emphasize swarm pressure, rapid weapon preparation, and pattern recognition against a relentless repeating program.
  - id: contenua
    name: Continnua
    wave_name: 1st Wave
    box: Astro Knights
    battle_difficulties:
      1: normal
      2: expert
    background: A misguided experiment in time science that escaped its laboratory and began consuming the fabric of time itself.
    story_notes: The fight should emphasize temporal distortion, escaped minions empowered by time bubbles, and the need to arm up fast before the battle's clock turns against the team.
  - id: volt_fusion
    name: Volt Fusion
    wave_name: 2nd Wave
    box: Astro Knights - Eternity
    battle_difficulties:
      2: normal
      4: expert
    background: What was once a gigantic robot has split into a swarm of electricity-feeding voltlings scattered through the Galactic Bazaar.
    story_notes: The fight should emphasize tracking hidden threats through crowded merchandise piles, protecting supply routes, and preventing the swarm from converging into a devastating collective force.
  - id: eternity
    name: Eternity
    wave_name: 2nd Wave
    box: Astro Knights - Eternity
    battle_difficulties:
      2: normal
      4: expert
    background: An overwhelming entity of unknown origin that does not simply attack, but subjects the Astro Knights to invasive tests under extreme pressure.
    story_notes: The fight should emphasize dilemmas, mental strain, and coordinated sacrifice. Eternity pressures the team into costly choices, so the narration should focus on trust, collective decision-making, and short-term pain accepted for long-term survival.
  - id: solar_collision
    name: Solar Collision
    wave_name: 2nd Wave
    box: Astro Knights - Eternity
    battle_difficulties:
      2: normal
      3: expert
    background: A supernova-level stellar disaster threatening Felis and the surrounding system with flares, debris, and total collapse.
    story_notes: "The fight should emphasize triage under pressure: stabilizing the sun with gravity tethers, protecting the planet, and covering evacuating ships while solar flares and rubble make every delay more dangerous."
  - id: fission_parasite
    name: Fission Parasite
    wave_name: 1st Wave
    box: The Orion System
    battle_difficulties:
      2: normal
      3: expert
    background: A living infection once dismissed as a ghost story, spreading corruption and toxic spores from planet to planet.
    story_notes: The fight should emphasize equipment corrosion, infection management, and the need to contain spreading exosludge before the parasite consumes the team's supplies and the situation snowballs out of control.
  - id: the_blackhole_galleon
    name: The Blackhole Galleon
    wave_name: 2nd Wave
    box: Savage Skies
    battle_difficulties:
      1: normal
      3: expert
    background: A feared pirate galleon in the Golari Quadrant, able to raid and attack at the same time while swashbots strip targets of their gear.
    story_notes: "The fight should emphasize stolen weapons, disposable loot, and the discipline to ignore raided belongings long enough to bring down the real threat: the cannon-arming galleon itself."
  - id: lunaris
    name: Lunaris
    wave_name: 1st Wave
    box: Astro Knights
    battle_difficulties:
      2: normal
      4: expert
    background: The self-declared soul of Lunaria, leading followers in a resource-stripping crusade toward immortality.
    story_notes: The fight should emphasize hubris, planetary-scale power, and the need to split pressure between Lunaris and its dangerous supporting forces.
